# Load the perl module for environment variable access
load_module /usr/lib/nginx/modules/ngx_http_perl_module.so;

user root;
worker_processes auto;
pid /var/run/nginx.pid;

# Pass environment variables to nginx
env BL_NAME;
env BL_REGION;
env BL_WORKSPACE_ID;
env BL_ENV;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Custom log format with more details
    log_format detailed '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';

    # Logging with more detail
    access_log /var/log/nginx/access.log detailed;
    access_log /dev/stdout detailed;
    error_log /var/log/nginx/error.log warn;

    # WebSocket connection upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Extract the first forwarded host, fallback to $http_host if no X-Forwarded-Host
    map $http_x_forwarded_host $forwarded_host {
        default $http_host;
        "~^([^,\s]+)" $1;
    }

    # Check if host is internal (*.beamlit.net)
    map $forwarded_host $is_internal {
        default 0;
        "~\.beamlit\.net" 1;
    }

    # Determine the domain based on BL_ENV
    perl_set $bl_domain 'sub {
        my $env = $ENV{"BL_ENV"} || "";
        return ($env eq "dev") ? "runv2.blaxel.dev" : "bl.run";
    }';

    # Check if host contains preview.<domain>
    perl_set $is_preview 'sub {
        my $r = shift;
        my $env = $ENV{"BL_ENV"} || "";
        my $domain = ($env eq "dev") ? "runv2.blaxel.dev" : "bl.run";
        my $host = $r->header_in("X-Forwarded-Host") || $r->header_in("Host") || "";
        $host =~ s/,.*//;
        $host =~ s/^\s+|\s+$//g;
        return ($host =~ /preview\.\Q$domain\E/) ? "1" : "0";
    }';

    # Construct the external hostname from environment variables
    # Pattern: sbx-{BL_NAME}-{lowercase(BL_WORKSPACE_ID)}.{BL_REGION}.<domain>
    perl_set $bl_external_host 'sub {
        my $name = $ENV{"BL_NAME"} || "";
        my $region = $ENV{"BL_REGION"} || "";
        my $workspace_id = lc($ENV{"BL_WORKSPACE_ID"} || "");
        my $env = $ENV{"BL_ENV"} || "";
        my $domain = ($env eq "dev") ? "runv2.blaxel.dev" : "bl.run";
        return ($name && $region && $workspace_id) ? "sbx-$name-$workspace_id.$region.$domain" : "";
    }';

    # URL rewriting maps
    # When accessed through internal proxy (*.beamlit.net), rewrite to the external bl.run URL
    # When accessed directly (localhost, preview, etc.), use the forwarded host as-is
    map "$is_internal:$is_preview" $ws_url {
        default "ws://$forwarded_host";
        "1:0" "wss://$bl_external_host/port/$server_port";
    }

    map "$is_internal:$is_preview" $wss_url {
        default "wss://$forwarded_host";
        "1:0" "wss://$bl_external_host/port/$server_port";
    }

    map "$is_internal:$is_preview" $http_url {
        default "http://$forwarded_host";
        "1:0" "https://$bl_external_host/port/$server_port";
    }

    map "$is_internal:$is_preview" $https_url {
        default "https://$forwarded_host";
        "1:0" "https://$bl_external_host/port/$server_port";
    }

    # Websocket endpoint for devtoolsFrontendUrl (bare host, no protocol)
    map "$is_internal:$is_preview" $websocket_endpoint_final {
        default "$forwarded_host";
        "1:0" "$bl_external_host/port/$server_port";
    }

    server {
        listen 8081;
        server_name _;

        # Handle WebSocket connections to DevTools
        location ~* ^/devtools/page/ {
            proxy_pass http://127.0.0.1:9222;

            # WebSocket specific headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Required headers for Chrome DevTools
            proxy_set_header Host localhost:9222;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for WebSocket
            proxy_buffering off;
            proxy_cache off;

            # Timeout settings for WebSocket
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # WebSocket specific timeouts
            proxy_socket_keepalive on;
        }

        # Handle all other DevTools API requests with URL rewriting
        location / {
            proxy_pass http://127.0.0.1:9222;

            # Override the Host header to localhost so Chrome accepts it
            proxy_set_header Host localhost:9222;

            # Preserve the original headers for debugging
            proxy_set_header X-Original-Host $forwarded_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 8081;

            # WebSocket support for DevTools Protocol (fallback)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Disable buffering for real-time communication
            proxy_buffering off;
            proxy_cache off;

            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # URL rewriting for WebSocket URLs in JSON responses
            # This replaces localhost:9222 with the actual host:port that clients use
            sub_filter_once off;
            sub_filter_types application/json;

            # Replace WebSocket URLs
            sub_filter 'ws://localhost:9222' '$ws_url';
            sub_filter 'wss://localhost:9222' '$wss_url';

            # Replace HTTP URLs
            sub_filter 'http://localhost:9222' '$http_url';
            sub_filter 'https://localhost:9222' '$https_url';

            # Fix devtoolsFrontendUrl which contains localhost:9222 without protocol
            sub_filter 'localhost:9222' '$websocket_endpoint_final';
        }
    }
}
